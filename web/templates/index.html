<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pi Mic Dashboard</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        margin: 0;
        padding: 12px;
        background: #0b0f14;
        color: #e6edf3;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }
      @media (min-width: 900px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
      .card {
        background: #111827;
        border: 1px solid #243244;
        border-radius: 10px;
        padding: 12px;
      }
      .row {
        display: flex;
        gap: 12px;
        align-items: baseline;
        flex-wrap: wrap;
      }
      #dbValue {
        font-size: 28px;
        font-weight: 700;
      }
      .small {
        opacity: 0.9;
      }
      #wavePlot,
      #melPlot {
        width: 100%;
        height: 340px;
      }
      #melPlot {
        height: 420px;
      }
      /* Canvas VLC views: real pixel drawing (Plotly was unreliable here on some Pis). */
      .vlc-canvas {
        display: block;
        width: 100%;
        height: 260px;
        border-radius: 6px;
        background: #0a0d0a;
      }
      #scopeCanvas {
        height: 280px;
      }
      .wave-controls {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }
      .wave-controls label {
        font-size: 13px;
        opacity: 0.95;
      }
      #waveGain {
        width: min(280px, 100%);
        accent-color: #38bdf8;
      }
      #waveGainValue {
        font-variant-numeric: tabular-nums;
        min-width: 3.5rem;
      }
    </style>
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  </head>
  <body>
    <div class="grid">
      <div class="card">
        <div class="row">
          <div class="small">Level (dBFS)</div>
          <div id="dbValue" style="white-space: pre-line">-</div>
        </div>
        <div id="status" class="small" style="margin-top: 8px">Connecting...</div>
      </div>

      <div class="card">
        <div class="small" style="margin-bottom: 8px">
          Waveform <span id="waveChLabel" class="small" style="opacity: 0.75"></span>
        </div>
        <div class="wave-controls">
          <label for="waveGain">Display gain</label>
          <input type="range" id="waveGain" min="1" max="500" step="1" value="80" />
          <span id="waveGainValue" class="small">×80</span>
          <span class="small" style="opacity: 0.75">(plot only; dB &amp; mel unchanged)</span>
        </div>
        <div id="wavePlot"></div>
      </div>

      <div class="card">
        <div class="small" style="margin-bottom: 8px">Scope (VLC-style)</div>
        <div class="small" style="opacity: 0.75; margin-bottom: 8px">
          Canvas oscilloscope (raw amplitude, no gain slider). Stereo: L = green, R = magenta.
        </div>
        <canvas id="scopeCanvas" class="vlc-canvas" width="800" height="280"></canvas>
      </div>

      <div class="card">
        <div class="small" style="margin-bottom: 8px">Spectrum analyzer (VLC-style)</div>
        <div class="small" style="opacity: 0.75; margin-bottom: 8px">
          Canvas bars from the latest mel column (green → yellow → red).
        </div>
        <canvas id="spectrumCanvas" class="vlc-canvas" width="800" height="260"></canvas>
      </div>

      <div class="card">
        <div class="small" style="margin-bottom: 8px">Mel Spectrogram (dB)</div>
        <div id="melPlot"></div>
      </div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
