<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pi Mic Dashboard</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        margin: 0;
        padding: 12px;
        background: #0b0f14;
        color: #e6edf3;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }
      @media (min-width: 900px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
      .card {
        background: #111827;
        border: 1px solid #243244;
        border-radius: 10px;
        padding: 12px;
      }
      .row {
        display: flex;
        gap: 12px;
        align-items: baseline;
        flex-wrap: wrap;
      }
      #dbValue {
        font-size: 28px;
        font-weight: 700;
      }
      .small {
        opacity: 0.9;
      }
      #wavePlot,
      #melPlot {
        width: 100%;
        height: 340px;
      }
      #melPlot {
        height: 420px;
      }
    </style>
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  </head>
  <body>
    <div class="grid">
      <div class="card">
        <div class="row">
          <div class="small">Level (dBFS)</div>
          <div id="dbValue">-</div>
        </div>
        <div id="status" class="small" style="margin-top: 8px;">Connecting...</div>
      </div>

      <div class="card">
        <div class="small" style="margin-bottom: 8px;">Waveform</div>
        <div id="wavePlot"></div>
      </div>

      <div class="card">
        <div class="small" style="margin-bottom: 8px;">Mel Spectrogram (dB)</div>
        <div id="melPlot"></div>
      </div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
